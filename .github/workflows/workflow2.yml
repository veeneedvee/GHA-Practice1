# ---------------------------------------------------------------
# Issue Tracker workflow
# Fires on issue events and writes a summary to the Actions UI.
#
# Jobs:
#   log-issue    — writes a markdown table to GITHUB_STEP_SUMMARY
#   label-check  — emits a ::warning:: when the "bug" label is added
#
# To extend: see ai-track-docs/extending-workflow2.md
# ---------------------------------------------------------------
name: Issue Tracker

# Trigger on new issues and label changes
on:
  issues:
    types: [opened, labeled]

# ── Feature toggles ───────────────────────────────────────────
# Set to 'false' to suppress bug-label warnings without removing the job.
env:
  ENABLE_LABEL_CHECK: 'true'

jobs:
  # Job 1 — Log a markdown summary for every issue event
  log-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Validate issue context
        # Guard: fail fast if required event fields are missing or empty
        # SECURITY: use env vars instead of direct ${{ }} interpolation
        # to prevent script injection via user-controlled fields (issue title, labels).
        # See: https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          START_NS=$(date +%s%N)
          VALID=true
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "::error::Missing issue number in event payload"
            VALID=false
          fi
          if [ -z "$ISSUE_TITLE" ]; then
            echo "::error::Missing issue title in event payload"
            VALID=false
          fi
          if [ -z "$ISSUE_AUTHOR" ]; then
            echo "::error::Missing issue author in event payload"
            VALID=false
          fi
          ELAPSED_MS=$(( ( $(date +%s%N) - START_NS ) / 1000000 ))
          if [ "$VALID" = "false" ]; then
            echo '{"op":"validate_issue","status":"fail","elapsed_ms":'"$ELAPSED_MS"'}'
            exit 1
          fi
          echo '{"op":"validate_issue","status":"ok","elapsed_ms":'"$ELAPSED_MS"'}'
      - name: Log issue details
        # Uses a heredoc to write a single markdown table to the
        # Actions Job Summary tab (GITHUB_STEP_SUMMARY)
        # SECURITY: all user-controlled values passed via env vars, not ${{ }}
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_ACTION: ${{ github.event.action }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          START_NS=$(date +%s%N)
          cat >> "$GITHUB_STEP_SUMMARY" <<TABLE
          ## Issue Event Summary
          | Field | Value |
          |-------|-------|
          | Number | #${ISSUE_NUMBER} |
          | Title | ${ISSUE_TITLE} |
          | Author | @${ISSUE_AUTHOR} |
          | Action | ${ISSUE_ACTION} |
          | Labels | ${ISSUE_LABELS} |
          | URL | ${ISSUE_URL} |
          TABLE
          ELAPSED_MS=$(( ( $(date +%s%N) - START_NS ) / 1000000 ))
          echo '{"op":"log_issue_summary","status":"ok","issue":'"$ISSUE_NUMBER"',"elapsed_ms":'"$ELAPSED_MS"'}'

  # Job 2 — React to the "bug" label specifically
  label-check:
    # Only runs when someone adds the "bug" label
    if: github.event.action == 'labeled' && github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    steps:
      - name: Bug label detected
        # ::warning:: surfaces as a yellow annotation in the Actions UI
        # Gated by ENABLE_LABEL_CHECK toggle (workflow-level env)
        # SECURITY: env vars prevent script injection from issue title
        if: env.ENABLE_LABEL_CHECK == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          echo "::warning::Bug label added to issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
      - name: Label check skipped
        if: env.ENABLE_LABEL_CHECK != 'true'
        run: |
          echo "Label check is disabled (ENABLE_LABEL_CHECK != true). Skipping."