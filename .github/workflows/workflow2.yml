name: Issue Tracker
on:
  issues:
    types: [opened, labeled]

jobs:
  log-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Log issue details
        run: |
          echo "## Issue Event Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Number | #${{ github.event.issue.number }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Title | ${{ github.event.issue.title }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Author | @${{ github.event.issue.user.login }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Action | ${{ github.event.action }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Labels | ${{ join(github.event.issue.labels.*.name, ', ') }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | ${{ github.event.issue.html_url }} |" >> "$GITHUB_STEP_SUMMARY"

  label-check:
    if: github.event.action == 'labeled' && github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    steps:
      - name: Bug label detected
        run: |
          echo "::warning::Bug label added to issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"